name: Build and Publish Docker Images

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Once a week on Sunday at midnight

env:
  REGISTRY_GHCR: ghcr.io
  # DockerHub namespace/repo
  IMAGE_NAME_FRONTEND: teeks99/mws-frontend
  IMAGE_NAME_BACKEND: teeks99/mws-backend
  # GHCR namespace/repo (supports nested structure)
  GHCR_IMAGE_NAME_FRONTEND: ${{ github.repository }}/mws-frontend
  GHCR_IMAGE_NAME_BACKEND: ${{ github.repository }}/mws-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Login to GitHub Container Registry
      - name: Log in to the GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generate tags based on git commit SHA
      - name: Extract version
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # --- FRONTEND ---
      - name: Extract Docker metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME_FRONTEND }}
            ${{ env.REGISTRY_GHCR }}/${{ env.GHCR_IMAGE_NAME_FRONTEND }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vars.outputs.sha_short }}
            type=sha

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- BACKEND ---
      - name: Extract Docker metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAME_BACKEND }}
            ${{ env.REGISTRY_GHCR }}/${{ env.GHCR_IMAGE_NAME_BACKEND }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vars.outputs.sha_short }}
            type=sha

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
