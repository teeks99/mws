version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      target: build
    # Override the default build command to run the Vite dev server instead
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5125:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://api:8000
    depends_on:
      - api

  api:
    build:
      context: ./backend
    # Hot-reload the FastAPI backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "5126:8000"
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  redis_data:
